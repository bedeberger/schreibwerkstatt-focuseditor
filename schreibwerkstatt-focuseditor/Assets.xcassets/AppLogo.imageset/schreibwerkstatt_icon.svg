<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="340" cy="340" r="290" fill="#1a1f3a"/>

  <!-- Book body -->
  <rect x="170" y="230" width="310" height="240" rx="8" fill="#2d6a9f"/>
  <!-- Spine -->
  <rect x="170" y="230" width="36" height="240" rx="4" fill="#1d4b73"/>
  <!-- Pages block -->
  <rect x="206" y="246" width="258" height="208" rx="4" fill="#f0ede8"/>

  <!-- Page lines (text lines) -->
  <line x1="230" y1="285" x2="440" y2="285" stroke="#c8c0b4" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="315" x2="440" y2="315" stroke="#c8c0b4" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="345" x2="380" y2="345" stroke="#c8c0b4" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="375" x2="440" y2="375" stroke="#c8c0b4" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="405" x2="350" y2="405" stroke="#c8c0b4" stroke-width="6" stroke-linecap="round"/>

  <!-- Feather / quill — overlaid diagonally -->
  <!-- Quill barrel -->
  <path d="M380 430 L500 180" stroke="#c4a55a" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Feather vane right side -->
  <path d="M500 180 C520 220 510 260 490 295 C475 320 460 340 440 360 L380 430 C400 400 415 370 425 340 C438 305 448 270 450 240 C455 210 500 180 500 180Z" fill="#e8d5a0"/>
  <!-- Feather vane left side -->
  <path d="M500 180 C475 205 460 235 450 265 C438 298 428 328 420 355 L380 430 C395 408 410 382 420 355 C435 315 445 275 448 245 C452 215 500 180 500 180Z" fill="#d4bc80"/>
  <!-- Quill tip -->
  <path d="M380 430 L372 452 L390 438Z" fill="#8a6a20"/>

  <!-- AI sparks / dots -->
  <!-- Spark lines -->
  <path d="M490 160 L510 140" stroke="#7eb8f0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M512 195 L538 190" stroke="#7eb8f0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M500 225 L524 235" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M472 148 L470 124" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M455 162 L440 142" stroke="#34d399" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Glowing dots at spark tips -->
  <circle cx="510" cy="140" r="6" fill="#7eb8f0"/>
  <circle cx="538" cy="190" r="5" fill="#7eb8f0"/>
  <circle cx="524" cy="235" r="4" fill="#a78bfa"/>
  <circle cx="470" cy="124" r="5" fill="#a78bfa"/>
  <circle cx="440" cy="142" r="4" fill="#34d399"/>

  <!-- Small bokeh dots scattered -->
  <circle cx="260" cy="200" r="3" fill="#7eb8f0" opacity="0.5"/>
  <circle cx="300" cy="185" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="420" cy="195" r="2.5" fill="#34d399" opacity="0.4"/>
  <circle cx="180" cy="350" r="2" fill="#7eb8f0" opacity="0.35"/>
  <circle cx="460" cy="490" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="200" cy="490" r="2" fill="#34d399" opacity="0.35"/>
</svg>
